<!DOCTYPE html>
<html>

<head>

    <title>View Documents</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <h1>📚 Uploaded Documents</h1>

    <table>

        <tr>

            <th>ID</th>
            <th>Title</th>
            <th>Topic</th>
            <th>Upload Date</th>
            <th>Content</th>

        </tr>

        {% for d in documents %}

        <tr>

            <td>{{d.id}}</td>

            <td>{{d.title}}</td>

            <td>{{d.topic}}</td>

            <td>{{d.upload_date}}</td>

            <td>{{d.content}}</td>

        </tr>

        {% endfor %}

    </table>

    <br>

    <a href="/">

        <button class="btn">

            Back To Home

        </button>

    </a>

</body>

</html>
