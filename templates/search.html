<!DOCTYPE html>
<html>

<head>

    <title>Search Documents</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <h1>🔍 Search Documents</h1>

    <form method="POST">

        <input
            type="text"
            name="keyword"
            placeholder="Enter keyword"
            required>

        <br><br>

        <button
            type="submit"
            class="btn">

            Search

        </button>

    </form>

    <br>

    <table>

        <tr>

            <th>ID</th>
            <th>Title</th>
            <th>Topic</th>
            <th>Content</th>

        </tr>

        {% for doc in results %}

        <tr>

            <td>{{doc.id}}</td>
            <td>{{doc.title}}</td>
            <td>{{doc.topic}}</td>
            <td>{{doc.content}}</td>

        </tr>

        {% endfor %}

    </table>

    <br>

    <a href="/">

        <button class="btn">

            Back To Home

        </button>

    </a>

</body>

</html>
